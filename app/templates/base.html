<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}PÚRPURA{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body>
    {% if user %}
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard">PÚRPURA · UdeMedellín</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/convocatorias">Convocatorias</a></li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item d-flex align-items-center gap-2">
                        <span class="text-white">{{ user.full_name }}</span>
                        <span class="badge badge-rol-{{ user.role.value }}">{{ user.role.value }}</span>
                    </li>
                    <li class="nav-item">
                        <form method="post" action="/logout" class="m-0">
                            <button type="submit" class="btn btn-sm btn-outline-light">Cerrar sesión</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    {% endif %}

    {% if error_403 %}
    <div class="container py-4">
        <div class="alert alert-danger text-center" role="alert">
            <h4 class="alert-heading">403 — Acceso denegado</h4>
            <p class="mb-0">{{ error_403 }}</p>
        </div>
    </div>
    {% endif %}

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
