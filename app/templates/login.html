{% extends 'base.html' %}
{% block title %}Iniciar sesión · PÚRPURA{% endblock %}

{% block content %}
<div class="login-wrapper">
  <div class="login-card">
    <div class="marca-institucional">
      <div class="escudo-grande">UdeM</div>
      <h1>Universidad de Medellín</h1>
      <div class="subtitulo">PÚRPURA · Sistema de Monitorías Académicas</div>
    </div>

    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div style="margin-bottom:16px;">
        <label for="email">Correo institucional</label>
        <input type="email" id="email" name="email" required autofocus
               placeholder="usuario@udem.edu.co" style="width:100%;">
      </div>
      <div style="margin-bottom:24px;">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required style="width:100%;">
      </div>
      <button type="submit" class="btn-udem" style="width:100%; padding:10px;">
        Ingresar
      </button>
    </form>

    <div style="text-align:center; margin-top:20px; font-size:11px; color:var(--udem-gray-dark);">
      Ciencia y Libertad · Vigilada MinEducación
    </div>
  </div>
</div>
{% endblock %}
