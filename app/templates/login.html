{% extends "base.html" %}
{% block title %}Iniciar sesión · PÚRPURA{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title mb-1">Iniciar sesión</h2>
                <p class="text-muted mb-3">Proyecto PÚRPURA</p>
                <div class="accent-line"></div>

                {% if error %}
                <div class="alert alert-danger" role="alert">{{ error }}</div>
                {% endif %}

                <form method="post" action="/login" novalidate>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email" name="email" placeholder="correo@udem.edu.co" required autofocus>
                        <label for="email">Correo electrónico</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Contraseña" required>
                        <label for="password">Contraseña</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
            </div>
            <div class="card-footer text-center text-muted small">
                Universidad de Medellín — Sistema de Monitorías
            </div>
        </div>
    </div>
</div>
{% endblock %}
